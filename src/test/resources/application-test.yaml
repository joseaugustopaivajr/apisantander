spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  flyway:
    enabled: false
  sql:
    init:
      mode: never

santander:
  certificate:
    path: classpath:application.yaml # Dummy file to avoid startup error in tests if p12 is missing
    password: password
    type: PKCS12
